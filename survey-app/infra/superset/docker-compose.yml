# Apache Superset рядом с проектом «Пульс».
# Метаданные Superset — в отдельном Postgres; данные опросов — подключите в UI как вторую БД (см. README).
#
# Запуск из этой папки:
#   cp .env.example .env   # отредактируйте секреты
#   docker compose up -d
#
# UI: http://localhost:8088  (логин/пароль из .env)

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  superset-meta:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SUPERSET_META_USER:-superset}
      POSTGRES_PASSWORD: ${SUPERSET_META_PASSWORD:-superset_meta_change_me}
      POSTGRES_DB: ${SUPERSET_META_DB:-superset}
    volumes:
      - superset_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${SUPERSET_META_USER:-superset} -d ${SUPERSET_META_DB:-superset}']
      interval: 5s
      timeout: 5s
      retries: 10

  superset:
    image: apache/superset:4.1.0
    restart: unless-stopped
    ports:
      - '${SUPERSET_PORT:-8088}:8088'
    user: root
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-generate-with-openssl}
      SUPERSET_DATABASE_URI: >-
        postgresql+psycopg2://${SUPERSET_META_USER:-superset}:${SUPERSET_META_PASSWORD:-superset_meta_change_me}@superset-meta:5432/${SUPERSET_META_DB:-superset}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.local}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    volumes:
      - ./superset_config_docker.py:/app/pythonpath/superset_config.py:ro
      - ./entrypoint-local.sh:/app/entrypoint-local.sh:ro
    depends_on:
      superset-meta:
        condition: service_healthy
      redis:
        condition: service_started
    command: ['/bin/bash', '/app/entrypoint-local.sh']

volumes:
  superset_meta_data:
